services:

  postgres:

    image: postgres:16

    container_name: healthcare-postgres

    environment:
      POSTGRES_USER: healthcare_user
      POSTGRES_PASSWORD: healthcare_password
      POSTGRES_DB: healthcare_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data



  n8n:

    image: n8nio/n8n:1.82.3

    container_name: healthcare-n8n

    ports:
      - "5678:5678"

    environment:

      

      - GENERIC_TIMEZONE=Asia/Dubai

      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http

      - WEBHOOK_URL=http://localhost:5678/

    volumes:

      - n8n_data:/home/node/.n8n



volumes:

  postgres_data:

  n8n_data: